<svg xmlns="http://www.w3.org/2000/svg" width="424" height="388" viewBox="0 0 424 388">
<defs>

<linearGradient id="gradBlue" x1="0%" y1="0%" x2="100%" y2="100%">
  <stop offset="0%" stop-color="#2f5fa8"/>
  <stop offset="100%" stop-color="#4b7bd1"/>
</linearGradient>

<linearGradient id="gradTeal" x1="0%" y1="0%" x2="100%" y2="100%">
  <stop offset="0%" stop-color="#2f8f9f"/>
  <stop offset="100%" stop-color="#58b8c6"/>
</linearGradient>

<linearGradient id="gradOrange" x1="0%" y1="0%" x2="100%" y2="100%">
  <stop offset="0%" stop-color="#ff7a2f"/>
  <stop offset="100%" stop-color="#ffb347"/>
</linearGradient>

<linearGradient id="gradRed" x1="0%" y1="0%" x2="100%" y2="100%">
  <stop offset="0%" stop-color="#ff4d3a"/>
  <stop offset="100%" stop-color="#ff7a5a"/>
</linearGradient>

<style>
.edge{fill:none;stroke-width:14;stroke-linecap:round;stroke-linejoin:round;}
</style>

</defs>

<!-- edges -->
<path class="edge" stroke="url(#gradBlue)" d="M20 224 L117 48"/>
<path class="edge" stroke="url(#gradBlue)" d="M20 224 L200 199"/>
<path class="edge" stroke="url(#gradTeal)" d="M20 224 L117 364"/>
<path class="edge" stroke="url(#gradTeal)" d="M117 364 L200 199"/>

<path class="edge" stroke="url(#gradOrange)" d="M200 199 L293 18"/>
<path class="edge" stroke="url(#gradRed)" d="M293 18 L401 198"/>
<path class="edge" stroke="url(#gradOrange)" d="M200 199 L401 198"/>

<!-- nodes -->
<circle cx="20" cy="224" r="17" fill="url(#gradBlue)"/>
<circle cx="117" cy="48" r="17" fill="url(#gradBlue)"/>
<circle cx="117" cy="364" r="17" fill="url(#gradTeal)"/>
<circle cx="200" cy="199" r="17" fill="url(#gradOrange)"/>
<circle cx="293" cy="18" r="17" fill="url(#gradRed)"/>
<circle cx="401" cy="198" r="17" fill="url(#gradOrange)"/>

</svg>
